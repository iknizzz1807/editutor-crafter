<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <style>
    .label { font-size: 11px; fill: #94a3b8; }
    .code  { font-size: 12px; fill: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
    .title { font-size: 14px; fill: #f1f5f9; font-weight: bold; }
    .dim   { fill: #1e293b; }
    .highlight { fill: #f59e0b; }

    /* ── Phase 0: dark bg fade in ── */
    #bg { animation: bgFade 0.6s ease-out forwards; }
    @keyframes bgFade { from { opacity:0 } to { opacity:1 } }

    /* ── Phase 1: title ── */
    #title-group { opacity:0; animation: fadeUp 0.5s ease-out 0.4s forwards; }
    #subtitle    { opacity:0; animation: fadeUp 0.4s ease-out 0.8s forwards; }

    /* ── Phase 2: source string appears ── */
    #source-box  { opacity:0; animation: slideIn 0.5s ease-out 1.2s forwards; }

    /* ── Phase 3: scanner cursor blinks over chars ── */
    #cursor      { opacity:0; animation: cursorAppear 0.2s 1.9s forwards; }
    #scan-line   { opacity:0; animation: scanAcross 2.4s linear 2.0s forwards; }

    /* ── Phase 4: tokens pop out ── */
    #tok1 { opacity:0; animation: tokenPop 0.35s cubic-bezier(0.34,1.56,0.64,1) 2.4s forwards; }
    #tok2 { opacity:0; animation: tokenPop 0.35s cubic-bezier(0.34,1.56,0.64,1) 2.8s forwards; }
    #tok3 { opacity:0; animation: tokenPop 0.35s cubic-bezier(0.34,1.56,0.64,1) 3.1s forwards; }
    #tok4 { opacity:0; animation: tokenPop 0.35s cubic-bezier(0.34,1.56,0.64,1) 3.4s forwards; }
    #tok5 { opacity:0; animation: tokenPop 0.35s cubic-bezier(0.34,1.56,0.64,1) 3.7s forwards; }
    #tok6 { opacity:0; animation: tokenPop 0.35s cubic-bezier(0.34,1.56,0.64,1) 4.0s forwards; }
    #tok7 { opacity:0; animation: tokenPop 0.35s cubic-bezier(0.34,1.56,0.64,1) 4.3s forwards; }

    /* ── Phase 5: arrows from tokens to stream ── */
    #arr1 { opacity:0; stroke-dasharray:80; stroke-dashoffset:80; animation: drawLine 0.4s ease-out 4.7s forwards; }
    #arr2 { opacity:0; stroke-dasharray:80; stroke-dashoffset:80; animation: drawLine 0.4s ease-out 4.9s forwards; }
    #arr3 { opacity:0; stroke-dasharray:80; stroke-dashoffset:80; animation: drawLine 0.4s ease-out 5.1s forwards; }
    #arr4 { opacity:0; stroke-dasharray:80; stroke-dashoffset:80; animation: drawLine 0.4s ease-out 5.3s forwards; }
    #arr5 { opacity:0; stroke-dasharray:80; stroke-dashoffset:80; animation: drawLine 0.4s ease-out 5.5s forwards; }
    #arr6 { opacity:0; stroke-dasharray:80; stroke-dashoffset:80; animation: drawLine 0.4s ease-out 5.7s forwards; }
    #arr7 { opacity:0; stroke-dasharray:80; stroke-dashoffset:80; animation: drawLine 0.4s ease-out 5.9s forwards; }

    /* ── Phase 6: token stream box ── */
    #stream-box  { opacity:0; animation: fadeIn 0.5s ease-out 4.6s forwards; }
    #stream-tok1 { opacity:0; animation: fadeIn 0.3s ease-out 4.8s forwards; }
    #stream-tok2 { opacity:0; animation: fadeIn 0.3s ease-out 5.0s forwards; }
    #stream-tok3 { opacity:0; animation: fadeIn 0.3s ease-out 5.2s forwards; }
    #stream-tok4 { opacity:0; animation: fadeIn 0.3s ease-out 5.4s forwards; }
    #stream-tok5 { opacity:0; animation: fadeIn 0.3s ease-out 5.6s forwards; }
    #stream-tok6 { opacity:0; animation: fadeIn 0.3s ease-out 5.8s forwards; }
    #stream-tok7 { opacity:0; animation: fadeIn 0.3s ease-out 6.0s forwards; }

    /* ── Phase 7: insight box ── */
    #insight     { opacity:0; animation: fadeUp 0.6s ease-out 6.4s forwards; }

    /* ── Phase 8: misconception cross-out ── */
    #wrong-line  { opacity:0; stroke-dasharray:200; stroke-dashoffset:200;
                   animation: drawLine 0.5s ease-out 7.0s forwards; }
    #wrong-box   { opacity:0; animation: fadeIn 0.4s 6.8s forwards; }
    #correct-box { opacity:0; animation: fadeUp 0.5s cubic-bezier(0.34,1.56,0.64,1) 7.6s forwards; }

    @keyframes fadeUp  { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
    @keyframes slideIn { from { opacity:0; transform:translateX(-20px) } to { opacity:1; transform:translateX(0) } }
    @keyframes tokenPop{ from { opacity:0; transform:scale(0.5) } to { opacity:1; transform:scale(1) } }
    @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
    @keyframes drawLine{ from { opacity:1; stroke-dashoffset:80 } to { opacity:1; stroke-dashoffset:0 } }
    @keyframes scanAcross {
      0%   { opacity:1; transform: translateX(0) }
      100% { opacity:0; transform: translateX(320px) }
    }
    @keyframes cursorAppear { to { opacity: 1 } }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    #cursor rect { animation: blink 0.6s 2.0s infinite; }
  </style>

  <!-- ════ BACKGROUND ════ -->
  <rect id="bg" width="900" height="600" fill="#0f172a"/>
  <!-- subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="900" height="600" fill="url(#grid)" opacity="0.5"/>

  <!-- ════ PHASE 1 — TITLE ════ -->
  <g id="title-group" transform="translate(450,44)">
    <text text-anchor="middle" font-size="22" font-weight="bold" fill="#f1f5f9">How a Tokenizer Works</text>
  </g>
  <g id="subtitle" transform="translate(450,68)">
    <text text-anchor="middle" font-size="12" fill="#64748b">Source text → Lexer scan → Token stream</text>
  </g>

  <!-- ════ PHASE 2 — SOURCE STRING ════ -->
  <g id="source-box" transform="translate(50,110)">
    <rect width="380" height="64" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="14" y="18" class="label">INPUT SOURCE</text>
    <text x="14" y="46" class="code" font-size="18" fill="#e2e8f0">x <tspan fill="#60a5fa">=</tspan> <tspan fill="#f59e0b">42</tspan> <tspan fill="#a78bfa">+</tspan> <tspan fill="#34d399">y</tspan></text>
    <!-- char underlines -->
    <rect x="14" y="52" width="10" height="2" rx="1" fill="#475569"/>
    <rect x="28" y="52" width="10" height="2" rx="1" fill="#475569"/>
    <rect x="42" y="52" width="10" height="2" rx="1" fill="#475569"/>
    <rect x="56" y="52" width="16" height="2" rx="1" fill="#475569"/>
    <rect x="76" y="52" width="10" height="2" rx="1" fill="#475569"/>
    <rect x="90" y="52" width="10" height="2" rx="1" fill="#475569"/>
    <rect x="104" y="52" width="10" height="2" rx="1" fill="#475569"/>
  </g>

  <!-- Scanner cursor -->
  <g id="cursor" transform="translate(64,155)">
    <rect width="8" height="3" rx="1" fill="#f59e0b"/>
  </g>
  <!-- Scan line (moves across) -->
  <rect id="scan-line" x="64" y="140" width="3" height="30" rx="1" fill="#f59e0b" opacity="0.7"/>

  <!-- ════ PHASE 3 — LEXER BOX ════ -->
  <g transform="translate(50,205)">
    <rect width="380" height="50" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1.5"/>
    <text x="14" y="16" class="label">LEXER / SCANNER</text>
    <text x="14" y="36" class="code" font-size="11" fill="#7dd3fc">read char → match pattern → emit token → advance</text>
  </g>

  <!-- ════ PHASE 4 — TOKENS ════ -->
  <!-- tok1: IDENT x -->
  <g id="tok1" transform="translate(50,290)">
    <rect width="76" height="54" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="8" y="16" font-size="9" fill="#93c5fd">IDENTIFIER</text>
    <text x="8" y="36" font-size="16" font-weight="bold" fill="#60a5fa">"x"</text>
    <text x="8" y="50" font-size="8" fill="#475569">pos: 0</text>
  </g>
  <!-- tok2: ASSIGN = -->
  <g id="tok2" transform="translate(136,290)">
    <rect width="76" height="54" rx="6" fill="#1c3a2f" stroke="#10b981" stroke-width="1.5"/>
    <text x="8" y="16" font-size="9" fill="#6ee7b7">ASSIGN</text>
    <text x="8" y="36" font-size="16" font-weight="bold" fill="#34d399">"="</text>
    <text x="8" y="50" font-size="8" fill="#475569">pos: 2</text>
  </g>
  <!-- tok3: INT 42 -->
  <g id="tok3" transform="translate(222,290)">
    <rect width="76" height="54" rx="6" fill="#3b2a1a" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="8" y="16" font-size="9" fill="#fcd34d">INTEGER</text>
    <text x="8" y="36" font-size="16" font-weight="bold" fill="#f59e0b">"42"</text>
    <text x="8" y="50" font-size="8" fill="#475569">pos: 4</text>
  </g>
  <!-- tok4: PLUS + -->
  <g id="tok4" transform="translate(308,290)">
    <rect width="76" height="54" rx="6" fill="#2d1b4e" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="8" y="16" font-size="9" fill="#c4b5fd">OPERATOR</text>
    <text x="8" y="36" font-size="16" font-weight="bold" fill="#a78bfa">"+"</text>
    <text x="8" y="50" font-size="8" fill="#475569">pos: 7</text>
  </g>
  <!-- tok5: IDENT y -->
  <g id="tok5" transform="translate(394,290)">
    <rect width="76" height="54" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="8" y="16" font-size="9" fill="#93c5fd">IDENTIFIER</text>
    <text x="8" y="36" font-size="16" font-weight="bold" fill="#60a5fa">"y"</text>
    <text x="8" y="50" font-size="8" fill="#475569">pos: 9</text>
  </g>
  <!-- tok6: NEWLINE -->
  <g id="tok6" transform="translate(480,290)">
    <rect width="76" height="54" rx="6" fill="#1a2a1a" stroke="#4ade80" stroke-width="1.5"/>
    <text x="8" y="16" font-size="9" fill="#86efac">NEWLINE</text>
    <text x="8" y="36" font-size="14" font-weight="bold" fill="#4ade80">"\n"</text>
    <text x="8" y="50" font-size="8" fill="#475569">pos: 10</text>
  </g>
  <!-- tok7: EOF -->
  <g id="tok7" transform="translate(566,290)">
    <rect width="76" height="54" rx="6" fill="#1e1e2e" stroke="#6366f1" stroke-width="1.5"/>
    <text x="8" y="16" font-size="9" fill="#a5b4fc">EOF</text>
    <text x="8" y="36" font-size="16" font-weight="bold" fill="#818cf8">""</text>
    <text x="8" y="50" font-size="8" fill="#475569">pos: 11</text>
  </g>

  <!-- ════ PHASE 5 — ARROWS TO STREAM ════ -->
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 Z" fill="#475569"/>
    </marker>
  </defs>
  <line id="arr1" x1="88"  y1="344" x2="88"  y2="390" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line id="arr2" x1="174" y1="344" x2="148" y2="390" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line id="arr3" x1="260" y1="344" x2="210" y2="390" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line id="arr4" x1="346" y1="344" x2="272" y2="390" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line id="arr5" x1="432" y1="344" x2="334" y2="390" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line id="arr6" x1="518" y1="344" x2="396" y2="390" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line id="arr7" x1="604" y1="344" x2="458" y2="390" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ════ PHASE 6 — TOKEN STREAM ════ -->
  <g id="stream-box" transform="translate(50,388)">
    <rect width="590" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="14" y="16" class="label">TOKEN STREAM  →  Parser input</text>
  </g>
  <g id="stream-tok1" transform="translate(64,406)"><rect width="54" height="22" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/><text x="4" y="15" font-size="10" fill="#60a5fa">IDENT:x</text></g>
  <g id="stream-tok2" transform="translate(124,406)"><rect width="52" height="22" rx="3" fill="#1c3a2f" stroke="#10b981" stroke-width="1"/><text x="4" y="15" font-size="10" fill="#34d399">ASSIGN</text></g>
  <g id="stream-tok3" transform="translate(182,406)"><rect width="46" height="22" rx="3" fill="#3b2a1a" stroke="#f59e0b" stroke-width="1"/><text x="4" y="15" font-size="10" fill="#f59e0b">INT:42</text></g>
  <g id="stream-tok4" transform="translate(234,406)"><rect width="48" height="22" rx="3" fill="#2d1b4e" stroke="#a78bfa" stroke-width="1"/><text x="4" y="15" font-size="10" fill="#a78bfa">PLUS</text></g>
  <g id="stream-tok5" transform="translate(288,406)"><rect width="54" height="22" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/><text x="4" y="15" font-size="10" fill="#60a5fa">IDENT:y</text></g>
  <g id="stream-tok6" transform="translate(348,406)"><rect width="62" height="22" rx="3" fill="#1a2a1a" stroke="#4ade80" stroke-width="1"/><text x="4" y="15" font-size="10" fill="#4ade80">NEWLINE</text></g>
  <g id="stream-tok7" transform="translate(416,406)"><rect width="36" height="22" rx="3" fill="#1e1e2e" stroke="#6366f1" stroke-width="1"/><text x="4" y="15" font-size="10" fill="#818cf8">EOF</text></g>

  <!-- ════ PHASE 7 — INSIGHT ════ -->
  <g id="insight" transform="translate(50,458)">
    <rect width="590" height="42" rx="6" fill="#1e293b" stroke="#0ea5e9" stroke-width="1"/>
    <text x="14" y="17" font-size="11" fill="#7dd3fc">Key insight:</text>
    <text x="100" y="17" font-size="11" fill="#e2e8f0">Tokenizer is CONTEXT-FREE — it never looks back, never peeks ahead.</text>
    <text x="14" y="33" font-size="11" fill="#e2e8f0">Each token is decided by a simple state machine reading one char at a time.</text>
  </g>

  <!-- ════ PHASE 8 — MISCONCEPTION / CORRECTION ════ -->
  <g id="wrong-box" transform="translate(50,516)">
    <rect width="280" height="36" rx="6" fill="#2a1515" stroke="#ef4444" stroke-width="1"/>
    <text x="14" y="15" font-size="10" fill="#fca5a5">Misconception:</text>
    <text x="110" y="15" font-size="10" fill="#e2e8f0">"The lexer understands syntax"</text>
    <text x="14" y="29" font-size="10" fill="#94a3b8">"Whitespace is always ignored"</text>
  </g>
  <!-- red cross-out line -->
  <line id="wrong-line" x1="50" y1="534" x2="330" y2="534"
        stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>

  <g id="correct-box" transform="translate(344,516)">
    <rect width="296" height="36" rx="6" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
    <text x="14" y="15" font-size="10" fill="#86efac">Reality:</text>
    <text x="60" y="15" font-size="10" fill="#e2e8f0">Lexer has ZERO syntax knowledge</text>
    <text x="14" y="29" font-size="10" fill="#e2e8f0">Whitespace rules are language-defined</text>
  </g>

  <!-- ════ SIDE PANEL: DFA STATE MACHINE ════ -->
  <g transform="translate(660,110)">
    <rect width="210" height="260" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="14" y="20" class="label">DFA STATE MACHINE</text>

    <!-- States -->
    <!-- START -->
    <circle cx="105" cy="55" r="22" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <text x="105" y="52" text-anchor="middle" font-size="9" fill="#94a3b8">START</text>
    <text x="105" y="64" text-anchor="middle" font-size="8" fill="#64748b">q0</text>

    <!-- IDENT -->
    <circle cx="44" cy="145" r="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="44" y="142" text-anchor="middle" font-size="9" fill="#93c5fd">IDENT</text>
    <text x="44" y="154" text-anchor="middle" font-size="8" fill="#64748b">q1</text>

    <!-- NUM -->
    <circle cx="105" cy="145" r="22" fill="#3b2a1a" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="105" y="142" text-anchor="middle" font-size="9" fill="#fcd34d">NUM</text>
    <text x="105" y="154" text-anchor="middle" font-size="8" fill="#64748b">q2</text>

    <!-- OP -->
    <circle cx="166" cy="145" r="22" fill="#2d1b4e" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="166" y="142" text-anchor="middle" font-size="9" fill="#c4b5fd">OP</text>
    <text x="166" y="154" text-anchor="middle" font-size="8" fill="#64748b">q3</text>

    <!-- EMIT (accepting) -->
    <circle cx="105" cy="228" r="20" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <circle cx="105" cy="228" r="15" fill="none" stroke="#22c55e" stroke-width="1"/>
    <text x="105" y="225" text-anchor="middle" font-size="9" fill="#86efac">EMIT</text>
    <text x="105" y="237" text-anchor="middle" font-size="8" fill="#64748b">accept</text>

    <!-- Transition arrows (static, drawn with path) -->
    <!-- q0->q1 [a-z] -->
    <path d="M88 68 L56 122" fill="none" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <text x="60" y="100" font-size="8" fill="#3b82f6">[a-z]</text>

    <!-- q0->q2 [0-9] -->
    <path d="M105 77 L105 122" fill="none" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <text x="110" y="107" font-size="8" fill="#f59e0b">[0-9]</text>

    <!-- q0->q3 [+=-] -->
    <path d="M122 68 L154 122" fill="none" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <text x="148" y="98" font-size="8" fill="#a78bfa">[op]</text>

    <!-- q1->q1 self loop [a-z0-9] -->
    <path d="M22 134 C6 120 6 160 22 158" fill="none" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <text x="2" y="147" font-size="7" fill="#3b82f6">[a-z]</text>

    <!-- q2->q2 self loop [0-9] -->
    <path d="M84 134 C76 118 76 158 84 160" fill="none" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <text x="60" y="147" font-size="7" fill="#f59e0b">[0-9]</text>

    <!-- q1->emit -->
    <path d="M56 166 L94 207" fill="none" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <!-- q2->emit -->
    <path d="M105 167 L105 207" fill="none" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <!-- q3->emit -->
    <path d="M154 166 L116 207" fill="none" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <text x="74" y="195" font-size="7" fill="#22c55e">delim</text>
  </g>

  <!-- Step counter -->
  <g transform="translate(660,385)">
    <rect width="210" height="60" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="14" y="18" class="label">COMPLEXITY</text>
    <text x="14" y="36" font-size="11" fill="#e2e8f0">Time:  <tspan fill="#34d399">O(n)</tspan>  — single pass</text>
    <text x="14" y="52" font-size="11" fill="#e2e8f0">Space: <tspan fill="#34d399">O(k)</tspan>  — k = token buffer</text>
  </g>

  <!-- Footer -->
  <text x="450" y="590" text-anchor="middle" font-size="9" fill="#334155">editutor · tokenizer · phase 1 of 4</text>
</svg>
