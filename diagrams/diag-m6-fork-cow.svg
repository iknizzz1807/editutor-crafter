direction: down
vars: {
  d2-config: {
    layout-engine: elk
    theme-id: 4
  }
}

title: "Fork + Copy-on-Write Memory | BGSAVE Read Without Blocking" {
  near: top-center
  shape: text
  style.font-size: 24
  style.bold: true
}

row1: "Before fork() | Parent Process" {
  direction: right
  style.stroke: transparent
  style.fill: transparent
  
  parent_box: "Parent Process" {
    shape: rectangle
    style.fill: "#E8DEF8"
    style.stroke: "#7B1FA2"
    style.stroke-width: 2
    
    page_table1: "Page Table" {
      shape: sql_table
      label: "Page Table (Parent)"
      p0: "Page 0 | Read/Write | data[0]"
      p1: "Page 1 | Read/Write | data[1]"
      p2: "Page 2 | Read/Write | data[2]"
    }
  }
  
  physical: "Physical Memory" {
    shape: rectangle
    style.fill: "#BBDEFB"
    style.stroke: "#1565C0"
    style.stroke-width: 2
    
    pm_page0: "Page 0 | ref=1" {
      style.fill: "#64B5F6"
    }
    pm_page1: "Page 1 | ref=1" {
      style.fill: "#64B5F6"
    }
    pm_page2: "Page 2 | ref=1" {
      style.fill: "#64B5F6"
    }
  }
  
  parent_box.page_table1 -> physical.pm_page0: "maps to" {
    style.stroke-dash: 3
  }
  parent_box.page_table1 -> physical.pm_page1: "maps to" {
    style.stroke-dash: 3
  }
  parent_box.page_table1 -> physical.pm_page2: "maps to" {
    style.stroke-dash: 3
  }
}

row2: "After fork() | Child Shares Pages Read-Only" {
  direction: right
  style.stroke: transparent
  style.fill: transparent
  
  parent_box2: "Parent Process" {
    shape: rectangle
    style.fill: "#E8DEF8"
    style.stroke: "#7B1FA2"
    style.stroke-width: 2
    label: "Parent Process"
    
    pt_parent: "Page Table (Parent)" {
      shape: sql_table
      label: "Parent Page Table"
      p0: "Page 0 | Read-Only"
      p1: "Page 1 | Read-Only"
      p2: "Page 2 | Read-Only"
    }
  }
  
  child_box2: "Child Process (BGSAVE)" {
    shape: rectangle
    style.fill: "#C8E6C9"
    style.stroke: "#388E3C"
    style.stroke-width: 2
    
    pt_child: "Page Table (Child)" {
      shape: sql_table
      label: "Child Page Table"
      p0: "Page 0 | Read-Only"
      p1: "Page 1 | Read-Only"
      p2: "Page 2 | Read-Only"
    }
  }
  
  physical2: "Physical Memory" {
    shape: rectangle
    style.fill: "#BBDEFB"
    style.stroke: "#1565C0"
    style.stroke-width: 2
    label: "Physical Memory (Shared)"
    
    pm_page0s: "Page 0 | ref=2" {
      style.fill: "#42A5F5"
      tooltip: "Page marked Read-Only by kernel"
    }
    pm_page1s: "Page 1 | ref=2" {
      style.fill: "#42A5F5"
    }
    pm_page2s: "Page 2 | ref=2" {
      style.fill: "#42A5F5"
    }
  }
  
  pt_parent -> physical2.pm_page0s: "maps to" {
    style.stroke-dash: 3
  }
  pt_parent -> physical2.pm_page1s: "maps to" {
    style.stroke-dash: 3
  }
  pt_parent -> physical2.pm_page2s: "maps to" {
    style.stroke-dash: 3
  }
  
  pt_child -> physical2.pm_page0s: "maps to" {
    style.stroke-dash: 3
  }
  pt_child -> physical2.pm_page1s: "maps to" {
    style.stroke-dash: 3
  }
  pt_child -> physical2.pm_page2s: "maps to" {
    style.stroke-dash: 3
  }
}

row3: "On Write | Copy-on-Write Triggered" {
  direction: right
  style.stroke: transparent
  style.fill: transparent
  
  parent_after: "Parent Process" {
    shape: rectangle
    style.fill: "#E8DEF8"
    style.stroke: "#7B1FA2"
    style.stroke-width: 2
    
    pt_parent_after: "Page Table (Parent)" {
      shape: sql_table
      label: "Parent Page Table"
      p0: "Page 0 | Copy | new page"
      p1: "Page 1 | Read-Only"
      p2: "Page 2 | Read-Only"
    }
  }
  
  child_after: "Child Process" {
    shape: rectangle
    style.fill: "#C8E6C9"
    style.stroke: "#388E3C"
    style.stroke-width: 2
    label: "Child Process (BGSAVE)"
    
    pt_child_after: "Page Table (Child)" {
      shape: sql_table
      label: "Child Page Table"
      p0: "Page 0 | Read-Only"
      p1: "Page 1 | Read-Only"
      p2: "Page 2 | Read-Only"
    }
  }
  
  physical_after: "Physical Memory" {
    shape: rectangle
    style.fill: "#BBDEFB"
    style.stroke: "#1565C0"
    style.stroke-width: 2
    label: "Physical Memory"
    
    new_page0: "Page 0 NEW | ref=1 | Parent's copy" {
      style.fill: "#81C784"
    }
    old_page0: "Page 0 OLD | ref=1 | Child's snapshot" {
      style.fill: "#90CAF9"
      tooltip: "Child still reads OLD data"
    }
    shared_1: "Page 1 | ref=1 | Shared" {
      style.fill: "#E0E0E0"
    }
    shared_2: "Page 2 | ref=1 | Shared" {
      style.fill: "#E0E0E0"
    }
  }
  
  pt_parent_after.new_page0 -> physical_after.new_page0: "maps to new copy"
  pt_child_after.old_page0 -> physical_after.old_page0: "maps to old copy (snapshot)"
}

explanation: "Key Points" {
  near: bottom-center
  shape: text
  style.font-size: 18
  style.font-color: "#424242"
}