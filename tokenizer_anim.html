<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tokenizer Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; display: flex; flex-direction: column; align-items: center;
         justify-content: center; min-height: 100vh; font-family: 'JetBrains Mono', monospace; }

  .stage { position: relative; width: 700px; height: 500px; }

  .frame { position: absolute; inset: 0; display: flex; align-items: center;
            justify-content: center; opacity: 0; transition: opacity 0.6s ease-in-out; }
  .frame.active { opacity: 1; }
  .frame img { max-width: 100%; max-height: 100%; object-fit: contain; }

  .controls { margin-top: 24px; display: flex; align-items: center; gap: 16px; }
  .btn { background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
          padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 13px;
          font-family: inherit; transition: all 0.2s; }
  .btn:hover { background: #334155; border-color: #3b82f6; }
  .btn:disabled { opacity: 0.3; cursor: default; }

  .dots { display: flex; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #334155;
          cursor: pointer; transition: all 0.2s; }
  .dot.active { background: #3b82f6; transform: scale(1.3); }

  .label { color: #94a3b8; font-size: 13px; margin-top: 12px; min-height: 20px;
            text-align: center; transition: opacity 0.3s; }

  .progress { width: 700px; height: 3px; background: #1e293b; margin-top: 16px; border-radius: 2px; }
  .progress-bar { height: 100%; background: #3b82f6; border-radius: 2px;
                   transition: width 0.3s ease; }
</style>
</head>

  frames[current].classList.remove('active');
  dots[current].classList.remove('active');
  current = n;
  frames[current].classList.add('active');
  dots[current].classList.add('active');
  document.getElementById('label').textContent = labels[current];
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === total - 1;
  document.getElementById('pbar').style.width = ((current + 1) / total * 100) + '%';
}

function go(dir) {
  const next = current + dir;
  if (next >= 0 && next < total) goTo(next);
}

function togglePlay() {
  const btn = document.getElementById('play');
  if (timer) {
    clearInterval(timer);
    timer = null;
    btn.textContent = '▶ Auto';
  } else {
    btn.textContent = '⏸ Pause';
    timer = setInterval(() => {
      if (current < total - 1) { goTo(current + 1); }
      else { goTo(0); }
    }, 2000);
  }
}
</script>
</body>
</html>
